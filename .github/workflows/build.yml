name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download yt-dlp
        run: |
          New-Item -ItemType Directory -Path binaries -Force
          curl -L -o binaries/yt-dlp.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
      - name: Download ffmpeg
        run: |
          curl -L -o ffmpeg-release.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          Expand-Archive -Path ffmpeg-release.zip -DestinationPath ffmpeg-temp
          Copy-Item ffmpeg-temp/ffmpeg-*/bin/ffmpeg.exe binaries/ -Force
          Copy-Item ffmpeg-temp/ffmpeg-*/bin/ffprobe.exe binaries/ -Force
          Remove-Item -Recurse -Force ffmpeg-release.zip, ffmpeg-temp
      - run: npm ci
      - run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: loadtube-windows
          path: |
            desktop/release/*.exe
            desktop/release/*.Setup*.exe

  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download yt-dlp
        run: |
          mkdir -p binaries
          curl -L -o binaries/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp
          chmod +x binaries/yt-dlp
      - name: Setup ffmpeg
        run: |
          brew install ffmpeg
          cp "$(brew --prefix ffmpeg)/bin/ffmpeg" binaries/ffmpeg
          cp "$(brew --prefix ffmpeg)/bin/ffprobe" binaries/ffprobe
          chmod +x binaries/ffmpeg binaries/ffprobe
      - run: npm ci
      - run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: loadtube-mac
          path: desktop/release/*.dmg
