# fly.toml app configuration file generated for load-tube on 2026-07-12T23:56:28+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'load-tube'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'file:/data/dev.db'
  NODE_ENV = 'production'
  PORT = '4000'
  TEMP_DIR = '/app/temp'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
